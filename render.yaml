services:
  - type: web
    name: api-gateway
    runtime: node
    repo: https://github.com/YOUR_USERNAME/api-gateway
    branch: main
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: api-gateway-db
          property: connectionString

  - type: postgresql
    name: api-gateway-db
    plan: free