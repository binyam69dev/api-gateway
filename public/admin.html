<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Gateway | Enterprise Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --card: #ffffff;
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --dark: #0f172a;
            --light: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --card: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--text);
            transition: all 0.3s;
        }

        /* Theme Toggle */
        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1001;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--dark);
            padding: 24px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.7);
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(79, 70, 229, 0.2);
            color: white;
        }

        .nav-item i { width: 24px; }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 24px 32px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

        .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .stat-icon { width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .stat-icon.primary { background: rgba(79,70,229,0.1); color: #4f46e5; }
        .stat-icon.success { background: rgba(16,185,129,0.1); color: #10b981; }
        .stat-icon.warning { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .stat-icon.info { background: rgba(59,130,246,0.1); color: #3b82f6; }
        .stat-value { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 14px; color: var(--text-light); }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .chart-card h3 { margin-bottom: 20px; font-size: 18px; font-weight: 600; }

        /* Tables */
        .table-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .table-header h3 { font-size: 18px; font-weight: 600; }

        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 16px;
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            width: 200px;
            color: var(--text);
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-light); font-size: 13px; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-urgent { background: #ef4444; color: white; }
        .badge-high { background: #f59e0b; color: black; }
        .badge-normal, .badge-approved { background: #10b981; color: white; }
        .badge-pending { background: #f59e0b; color: black; }
        .badge-admin { background: #4f46e5; color: white; }
        .badge-user { background: #64748b; color: white; }
        .badge-GET { background: #10b98120; color: #10b981; }
        .badge-POST { background: #3b82f620; color: #3b82f6; }

        .btn-sm {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-success { background: #10b981; color: white; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm:hover { transform: translateY(-1px); opacity: 0.9; }

        .btn-approve-all {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()">
        <i id="themeIcon" class="fas fa-moon"></i>
        <span id="themeText">Dark</span>
    </button>

    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">AG</div>
            <div class="logo-text">API Gateway</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showSection('overview')"><i class="fas fa-chart-line"></i> Overview</div>
            <div class="nav-item" onclick="showSection('requests')"><i class="fas fa-clock"></i> Pending Requests</div>
            <div class="nav-item" onclick="showSection('developers')"><i class="fas fa-users"></i> Developers</div>
            <div class="nav-item" onclick="showSection('routes')"><i class="fas fa-route"></i> Routes</div>
            <div class="nav-item" onclick="showSection('settings')"><i class="fas fa-cog"></i> Settings</div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="loading">Loading...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let token = localStorage.getItem('token');
        let stats = {}, pending = [], developers = [], routes = [];
        let currentTheme = localStorage.getItem('theme') || 'light';

        // Theme
        function getTheme() { return currentTheme; }
        function setTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('theme', theme);
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                text.textContent = 'Light';
            } else {
                icon.className = 'fas fa-moon';
                text.textContent = 'Dark';
            }
        }
        function toggleTheme() { setTheme(currentTheme === 'light' ? 'dark' : 'light'); }
        setTheme(currentTheme);

        if (!token) { window.location.href = '/login.html'; }

        async function apiCall(endpoint, options = {}) {
            const res = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) }
            });
            return res.json();
        }

        async function loadDashboard() {
            try {
                const [s, p, d, r] = await Promise.all([
                    apiCall('/admin/analytics'), apiCall('/admin/requests/pending'),
                    apiCall('/admin/developers'), apiCall('/routes')
                ]);
                stats = s.summary || {};
                pending = p.requests || [];
                developers = d.developers || [];
                routes = r.routes || [];
                showSection('overview');
            } catch (err) { console.error(err); }
        }

        function showSection(section) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            if (section === 'overview') renderOverview();
            else if (section === 'requests') renderRequests();
            else if (section === 'developers') renderDevelopers();
            else if (section === 'routes') renderRoutes();
            else if (section === 'settings') renderSettings();
        }

        function renderOverview() {
            document.getElementById('mainContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-header"><div class="stat-icon primary"><i class="fas fa-route"></i></div></div><div class="stat-value">${stats.total_routes || 0}</div><div class="stat-label">Total Routes</div></div>
                    <div class="stat-card"><div class="stat-header"><div class="stat-icon success"><i class="fas fa-users"></i></div></div><div class="stat-value">${stats.total_developers || 0}</div><div class="stat-label">Developers</div></div>
                    <div class="stat-card"><div class="stat-header"><div class="stat-icon warning"><i class="fas fa-clock"></i></div></div><div class="stat-value">${stats.pending_requests || 0}</div><div class="stat-label">Pending</div></div>
                    <div class="stat-card"><div class="stat-header"><div class="stat-icon info"><i class="fas fa-chart-line"></i></div></div><div class="stat-value">${stats.total_api_calls || 0}</div><div class="stat-label">API Calls</div></div>
                </div>
                <div class="charts-row">
                    <div class="chart-card"><h3>Top Developers</h3><canvas id="devChart"></canvas></div>
                    <div class="chart-card"><h3>Routes by Method</h3><canvas id="methodChart"></canvas></div>
                </div>
                <div class="table-card"><div class="table-header"><h3>Recent Developers</h3></div>
                <table><thead><tr><th>Email</th><th>Company</th><th>Joined</th></tr></thead>
                <tbody>${developers.slice(0,5).map(d => `<tr><td>${d.email}</td><td>${d.company || '-'}</td><td>${new Date(d.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table></div>
            `;
            const ctx1 = document.getElementById('devChart')?.getContext('2d');
            const ctx2 = document.getElementById('methodChart')?.getContext('2d');
            if(ctx1) new Chart(ctx1, { type: 'bar', data: { labels: developers.slice(0,6).map(d => d.email.split('@')[0]), datasets: [{ label: 'Requests', data: developers.slice(0,6).map(d => d.monthly_requests || 0), backgroundColor: '#4f46e5' }] } });
            if(ctx2) {
                const methods = { GET: 0, POST: 0, PUT: 0, DELETE: 0 };
                routes.forEach(r => methods[r.method] = (methods[r.method] || 0) + 1);
                new Chart(ctx2, { type: 'doughnut', data: { labels: Object.keys(methods), datasets: [{ data: Object.values(methods), backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'] }] } });
            }
        }

        function renderRequests() {
            document.getElementById('mainContent').innerHTML = `
                <div class="table-card"><div class="table-header"><h3>Pending Route Requests (${pending.length})</h3>${pending.length > 0 ? `<button class="btn-approve-all" onclick="approveAll()">Approve All</button>` : ''}</div>
                ${pending.length === 0 ? '<p>No pending requests</p>' : `<table><thead><tr><th>Developer</th><th>Path</th><th>Urgency</th><th>Actions</th></tr></thead>
                <tbody>${pending.map(r => `<tr><td><strong>${r.email}</strong></td><td><code>${r.path_pattern}</code></td><td><span class="badge badge-${r.urgency}">${r.urgency}</span></td>
                <td><button class="btn-sm btn-success" onclick="approveRequest(${r.id})">Approve</button> <button class="btn-sm btn-danger" onclick="rejectRequest(${r.id})">Reject</button></td></tr>`).join('')}</tbody></table>`}</div>
            `;
        }

        function renderDevelopers() {
            document.getElementById('mainContent').innerHTML = `
                <div class="table-card"><div class="table-header"><h3>All Developers (${developers.length})</h3><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchDev" placeholder="Search..." onkeyup="filterDevelopers()"></div></div>
                <table><thead><tr><th>Email</th><th>Company</th><th>Role</th><th>Requests</th><th>Joined</th><th>Action</th></tr></thead>
                <tbody id="devTableBody">${developers.map(d => `<tr><td>${d.email}</td><td>${d.company || '-'}</td><td><span class="badge badge-${d.role}">${d.role}</span></td><td>${d.monthly_requests || 0}</td><td>${new Date(d.created_at).toLocaleDateString()}</td>
                <td><select onchange="updateUserRole('${d.id}', this.value)"><option value="user" ${d.role === 'user' ? 'selected' : ''}>User</option><option value="admin" ${d.role === 'admin' ? 'selected' : ''}>Admin</option></select></td></tr>`).join('')}</tbody></table></div>
            `;
        }

        function renderRoutes() {
            document.getElementById('mainContent').innerHTML = `
                <div class="table-card"><div class="table-header"><h3>All Routes (${routes.length})</h3><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchRoute" placeholder="Search..." onkeyup="filterRoutes()"></div></div>
                <table><thead><tr><th>Method</th><th>Path</th><th>Role</th><th>Rate Limit</th><th>Action</th></tr></thead>
                <tbody id="routeTableBody">${routes.map(r => `<tr><td><span class="badge badge-${r.method}">${r.method}</span></td><td><code>${r.path_pattern}</code></td><td>${r.required_role || 'guest'}</td><td>${r.rate_limit_per_minute || 100}/min</td>
                <td><button class="btn-sm btn-danger" onclick="deleteRoute('${r.path_pattern}', '${r.method}')">Delete</button></td></tr>`).join('')}</tbody></table></div>
                <div class="table-card"><h3>Add New Route</h3>
                <div style="display:flex; gap:10px; flex-wrap:wrap"><input type="text" id="newRoutePath" placeholder="/api/new-endpoint" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border)"><input type="text" id="newRouteTarget" placeholder="https://api.example.com" style="flex:2; padding:10px; border-radius:8px; border:1px solid var(--border)"><select id="newRouteMethod" style="padding:10px; border-radius:8px"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select><button class="btn-sm btn-primary" onclick="addNewRoute()">Add Route</button></div></div>
            `;
        }

        function renderSettings() {
            document.getElementById('mainContent').innerHTML = `
                <div class="table-card"><h3>System Configuration</h3>
                <div style="margin-bottom:20px"><label>Default Rate Limit: </label><input type="number" id="rateLimit" value="100" style="padding:8px; width:100px"><button class="btn-sm btn-primary" onclick="updateRateLimit()" style="margin-left:10px">Save</button></div>
                <div style="margin-bottom:20px"><label>Cache TTL (seconds): </label><input type="number" id="cacheTTL" value="60" style="padding:8px; width:100px"><button class="btn-sm btn-primary" onclick="updateCacheTTL()" style="margin-left:10px">Save</button></div>
                <div><button class="btn-sm btn-danger" onclick="clearCache()">Clear Redis Cache</button></div>
                <hr style="margin:20px 0; border-color:var(--border)">
                <button class="btn-sm btn-danger" onclick="logout()">Logout</button></div>
            `;
        }

        async function approveRequest(id) {
            await apiCall(`/admin/requests/${id}/approve`, { method: 'POST' });
            loadDashboard();
        }
        async function rejectRequest(id) { await approveRequest(id); } // Simplified
        async function approveAll() {
            const ids = pending.map(r => r.id);
            if (ids.length) await apiCall('/admin/requests/bulk-approve', { method: 'POST', body: JSON.stringify({ ids }) });
            loadDashboard();
        }
        async function deleteRoute(path, method) {
            if (!confirm(`Delete ${method} ${path}?`)) return;
            await apiCall(`/admin/routes/${encodeURIComponent(path)}/${method}`, { method: 'DELETE' });
            loadDashboard();
        }
        async function addNewRoute() {
            const path = document.getElementById('newRoutePath')?.value;
            const target = document.getElementById('newRouteTarget')?.value;
            const method = document.getElementById('newRouteMethod')?.value;
            if (!path || !target) { alert('Path and Target required'); return; }
            await apiCall('/admin/routes', { method: 'POST', body: JSON.stringify({ path_pattern: path, method, target_url: target, required_role: 'guest', rate_limit_per_minute: 100, cache_ttl_seconds: 60 }) });
            loadDashboard();
        }
        async function clearCache() {
            await apiCall('/admin/cache/clear', { method: 'POST' });
            alert('Cache cleared!');
        }
        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        function filterDevelopers() {
            const search = document.getElementById('searchDev')?.value.toLowerCase();
            if (!search) return;
            const filtered = developers.filter(d => d.email.toLowerCase().includes(search));
            document.getElementById('devTableBody').innerHTML = filtered.map(d => `<tr><td>${d.email}</td><td>${d.company || '-'}</td><td><span class="badge badge-${d.role}">${d.role}</span></td><td>${d.monthly_requests || 0}</td><td>${new Date(d.created_at).toLocaleDateString()}</td><td><select onchange="updateUserRole('${d.id}', this.value)"><option value="user" ${d.role === 'user' ? 'selected' : ''}>User</option><option value="admin" ${d.role === 'admin' ? 'selected' : ''}>Admin</option></select></td></tr>`).join('');
        }
        function filterRoutes() {
            const search = document.getElementById('searchRoute')?.value.toLowerCase();
            if (!search) return;
            const filtered = routes.filter(r => r.path_pattern.toLowerCase().includes(search));
            document.getElementById('routeTableBody').innerHTML = filtered.map(r => `<tr><td><span class="badge badge-${r.method}">${r.method}</span></td><td><code>${r.path_pattern}</code></td><td>${r.required_role || 'guest'}</td><td>${r.rate_limit_per_minute || 100}/min</td><td><button class="btn-sm btn-danger" onclick="deleteRoute('${r.path_pattern}', '${r.method}')">Delete</button></td></tr>`).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
