<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Sign In | API Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .logo:hover { transform: scale(1.05); }
        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 28px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            background: none;
            border: none;
            color: #64748b;
            transition: all 0.3s;
        }
        .tab.active {
            background: white;
            color: #4f46e5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
        }
        .input-group { position: relative; }
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .username-hint {
            font-size: 11px;
            color: #64748b;
            margin-top: 5px;
            display: block;
        }
        .error-message {
            font-size: 12px;
            color: #ef4444;
            margin-top: 5px;
            display: none;
        }
        .password-strength {
            margin-top: 8px;
            margin-bottom: 0;
        }
        .strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            transition: all 0.3s;
            width: 0%;
        }
        .strength-bar.weak { background: #ef4444; width: 25%; }
        .strength-bar.fair { background: #f59e0b; width: 50%; }
        .strength-bar.good { background: #3b82f6; width: 75%; }
        .strength-bar.strong { background: #10b981; width: 100%; }
        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            display: block;
        }
        .strength-text.weak { color: #ef4444; }
        .strength-text.fair { color: #f59e0b; }
        .strength-text.good { color: #3b82f6; }
        .strength-text.strong { color: #10b981; }
        button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        button:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        button:active { transform: translateY(0); }
        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: calc(50% - 56px);
            height: 1px;
            background: #e2e8f0;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: white;
            padding: 0 14px;
            color: #64748b;
            font-size: 12px;
        }
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            border: 1.5px solid #e2e8f0;
            background: white;
            transition: all 0.3s;
            font-size: 14px;
            color: #1e293b;
        }
        .social-btn i { font-size: 20px; }
        .social-btn.google:hover { background: #db4437; color: white; border-color: #db4437; }
        .social-btn.github:hover { background: #24292f; color: white; border-color: #24292f; }
        .social-btn.facebook:hover { background: #1877f2; color: white; border-color: #1877f2; }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
            border-left: 4px solid #991b1b;
        }
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
            border-left: 4px solid #065f46;
        }
        .message.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
            border-left: 4px solid #1e40af;
        }
        .demo-info {
            margin-top: 20px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 14px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #e2e8f0;
        }
        .demo-info strong { color: #4f46e5; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a {
            color: #4f46e5;
            text-decoration: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .back-link a:hover { color: #4338ca; text-decoration: underline; }
        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo" onclick="window.location.href='developer-portal.html'">
            <i class="fas fa-code"></i>
        </div>
        <h1>Developer Portal</h1>
        <p class="subtitle">Sign in or create your developer account</p>

        <div id="message" class="message"></div>

        <div class="tabs">
            <button class="tab active" id="loginTab" onclick="showTab('login')">Sign In</button>
            <button class="tab" id="registerTab" onclick="showTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="loginIdentifier" placeholder="Email or Username">
                </div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
            </div>
            <button onclick="doLogin()">Sign In</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regFullName" placeholder="Full name">
                </div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="regUsername" placeholder="Username (3-30 chars)">
                </div>
                <div class="username-hint">Letters, numbers, dots, underscores only</div>
                <div id="usernameError" class="error-message"></div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Email address">
                </div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Password (min 12 chars)">
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                    <span id="strengthText" class="strength-text"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm password">
                </div>
            </div>
            <button onclick="doRegister()">Create Account</button>
        </div>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-buttons">
            <button class="social-btn google" onclick="socialLogin('google')">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <button class="social-btn github" onclick="socialLogin('github')">
                <i class="fab fa-github"></i> Continue with GitHub
            </button>
            <button class="social-btn facebook" onclick="socialLogin('facebook')">
                <i class="fab fa-facebook-f"></i> Continue with Facebook
            </button>
        </div>

        <div class="demo-info">
            <strong>📋 Demo Account</strong><br />
            Email: <strong>developer@example.com</strong><br />
            Username: <strong>developer</strong><br />
            Password: <strong>Dev@2025#Portal</strong>
        </div>

        <div class="back-link">
            <a onclick="window.location.href='developer-portal.html'">← Back to Portal</a>
        </div>
    </div>

    <script>
        const API_URL = "";

        function checkPasswordStrength(password) {
            let score = 0;
            if (password.length >= 12) score++;
            if (password.length >= 16) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[!@#$%^&*]/.test(password)) score++;
            
            if (score <= 2) return { text: 'Very Weak', class: 'weak' };
            if (score <= 3) return { text: 'Weak', class: 'weak' };
            if (score <= 4) return { text: 'Fair', class: 'fair' };
            if (score <= 5) return { text: 'Good', class: 'good' };
            return { text: 'Strong', class: 'strong' };
        }

        function showMessage(msg, type) {
            const el = document.getElementById("message");
            el.textContent = msg;
            el.className = `message ${type}`;
            el.style.display = "block";
            setTimeout(() => {
                el.style.display = "none";
                el.className = "message";
            }, 5000);
        }

        function showTab(tab) {
            const loginForm = document.getElementById("loginForm");
            const registerForm = document.getElementById("registerForm");
            const loginTab = document.getElementById("loginTab");
            const registerTab = document.getElementById("registerTab");

            if (tab === "login") {
                loginForm.style.display = "block";
                registerForm.style.display = "none";
                loginTab.classList.add("active");
                registerTab.classList.remove("active");
            } else {
                loginForm.style.display = "none";
                registerForm.style.display = "block";
                registerTab.classList.add("active");
                loginTab.classList.remove("active");
            }
        }

        async function doLogin() {
            const identifier = document.getElementById("loginIdentifier").value.trim();
            const password = document.getElementById("loginPassword").value;
            
            if (!identifier || !password) {
                showMessage("Please enter email/username and password", "error");
                return;
            }
            
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(identifier);
            const loginData = isEmail 
                ? { email: identifier, password: password }
                : { username: identifier, password: password };
            
            const btn = document.querySelector("#loginForm button");
            const originalText = btn.textContent;
            btn.textContent = "Signing in...";
            btn.disabled = true;
            
            try {
                const res = await fetch(`/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(loginData),
                });
                
                const data = await res.json();
                
                if (res.ok && (data.token || data.message === "Login successful")) {
                    showMessage("Login successful! Redirecting...", "success");
                    setTimeout(() => {
                        window.location.href = "/developer-dashboard.html";
                    }, 1500);
                } else {
                    showMessage(data.error || "Invalid credentials", "error");
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Login error:", err);
                showMessage("Connection error. Please try again.", "error");
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function doRegister() {
            const fullName = document.getElementById("regFullName").value.trim();
            const username = document.getElementById("regUsername").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const password = document.getElementById("regPassword").value;
            const confirmPassword = document.getElementById("regConfirmPassword").value;
            
            if (!fullName) {
                showMessage("Please enter your full name", "error");
                return;
            }
            
            if (!username) {
                showMessage("Please choose a username", "error");
                return;
            }
            if (username.length < 3) {
                showMessage("Username must be at least 3 characters", "error");
                return;
            }
            if (!/^[a-zA-Z0-9._]+$/.test(username)) {
                showMessage("Username can only contain letters, numbers, dots, and underscores", "error");
                return;
            }
            
            if (!email) {
                showMessage("Please enter your email address", "error");
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage("Please enter a valid email address", "error");
                return;
            }
            
            if (!password) {
                showMessage("Please enter a password", "error");
                return;
            }
            if (password.length < 12) {
                showMessage("Password must be at least 12 characters", "error");
                return;
            }
            if (!/[A-Z]/.test(password)) {
                showMessage("Password must contain at least 1 uppercase letter", "error");
                return;
            }
            if (!/[a-z]/.test(password)) {
                showMessage("Password must contain at least 1 lowercase letter", "error");
                return;
            }
            if (!/[0-9]/.test(password)) {
                showMessage("Password must contain at least 1 number", "error");
                return;
            }
            if (!/[!@#$%^&*]/.test(password)) {
                showMessage("Password must contain at least 1 special character (!@#$%^&*)", "error");
                return;
            }
            if (password !== confirmPassword) {
                showMessage("Passwords do not match", "error");
                return;
            }
            
            const btn = document.querySelector("#registerForm button");
            const originalText = btn.textContent;
            btn.textContent = "Creating account...";
            btn.disabled = true;
            
            try {
                const res = await fetch(`/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ 
                        name: fullName,
                        username: username,
                        email: email, 
                        password: password 
                    }),
                });
                
                const data = await res.json();
                
                if (res.status === 201 || res.ok) {
                    showMessage("Account created successfully! Please login.", "success");
                    
                    document.getElementById("regFullName").value = "";
                    document.getElementById("regUsername").value = "";
                    document.getElementById("regEmail").value = "";
                    document.getElementById("regPassword").value = "";
                    document.getElementById("regConfirmPassword").value = "";
                    
                    setTimeout(() => {
                        showTab("login");
                        document.getElementById("loginIdentifier").value = email;
                        document.getElementById("loginPassword").value = "";
                        showMessage("You can now login with your new account!", "success");
                    }, 2000);
                } else {
                    showMessage(data.error || "Registration failed. Please try again.", "error");
                }
                btn.textContent = originalText;
                btn.disabled = false;
            } catch (err) {
                console.error("Register error:", err);
                showMessage("Connection error. Please try again.", "error");
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function socialLogin(provider) {
            if (provider === "google") {
                window.location.href = `/auth/developer/google`;
            } else if (provider === "github") {
                window.location.href = `/auth/developer/github`;
            } else if (provider === "facebook") {
                window.location.href = `/auth/developer/facebook`;
            }
        }

        async function checkAlreadyLoggedIn() {
            try {
                const res = await fetch(`/auth/profile`, {
                    credentials: "include"
                });
                if (res.ok) {
                    window.location.href = "/developer-dashboard.html";
                }
            } catch (err) {
                // Not logged in, stay on page
            }
        }

        // Password strength meter
        const passwordInput = document.getElementById("regPassword");
        if (passwordInput) {
            passwordInput.addEventListener("input", function(e) {
                const strength = checkPasswordStrength(e.target.value);
                const bar = document.getElementById("strengthBar");
                const text = document.getElementById("strengthText");
                if (bar) bar.className = `strength-bar ${strength.class}`;
                if (text) {
                    text.className = `strength-text ${strength.class}`;
                    text.textContent = `Password Strength: ${strength.text}`;
                }
            });
        }

        // Initialize
        checkAlreadyLoggedIn();
    </script>
</body>
</html>
