# API Gateway Configuration
server:
  port: 3000
  env: development  # development, staging, production

database:
  postgres:
    host: localhost
    port: 5432
    name: api_gateway
    user: gateway_admin
    password: SecurePass123!
    pool:
      min: 2
      max: 10
  redis:
    host: localhost
    port: 6379
    password: ""
    ttl:
      cache: 60
      rateLimit: 60

auth:
  jwt:
    secret: my-super-secret-key-change-this
    expiresIn: 24h
  bcrypt:
    saltRounds: 10

rateLimit:
  default:
    windowMs: 60000
    maxRequests: 100
  strict:
    windowMs: 60000
    maxRequests: 5
  login:
    windowMs: 60000
    maxRequests: 10

circuitBreaker:
  enabled: true
  failureThreshold: 5      # Fail after 5 failures
  timeout: 10000           # 10 seconds
  resetTimeout: 60000      # Try again after 60 seconds

serviceDiscovery:
  enabled: false           # Set to true for auto-discovery
  registryInterval: 30000  # Check every 30 seconds
  services:                # Manual services (fallback)
    - name: user-service
      url: http://localhost:3001
      healthCheck: /health
    - name: product-service
      url: http://localhost:3002
      healthCheck: /health

monitoring:
  metrics: true
  prometheus:
    enabled: true
    endpoint: /metrics

logging:
  level: info  # debug, info, warn, error
  prettyPrint: true

cors:
  origins:
    - http://localhost:3000
    - http://localhost:8080
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
